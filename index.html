<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المنسق HR - نظام إدارة الموارد البشرية</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- SheetJS for Excel Processing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .desktop-container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        @media print {
            @page { 
                size: A4 landscape; 
                margin: 5mm; 
            }
            .print-portrait {
                size: A4 portrait !important;
            }
            html, body { 
                width: 100%; 
                height: auto; 
                background: white !important; 
                color: black !important; 
                margin: 0;
                padding: 0;
            }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            main { padding: 0 !important; margin: 0 !important; }
            .payroll-table { 
                width: 100% !important; 
                border: 1px solid #333 !important;
                font-size: 8pt !important;
                border-collapse: collapse !important;
            }
            .payroll-table th, .payroll-table td { 
                border: 1px solid #333 !important; 
                padding: 4px !important;
                line-height: 1.2 !important;
            }
            .payroll-table th {
                background-color: #f8fafc !important;
                color: black !important;
                -webkit-print-color-adjust: exact;
            }
            input { 
                border: none !important; 
                background: transparent !important; 
                text-align: center !important; 
                width: 100% !important; 
                color: black !important;
                font-size: inherit !important;
            }
            input[type=number] { -moz-appearance: textfield; }
            input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
            
            .shadow-2xl, .shadow-xl, .shadow-sm, .shadow-lg { box-shadow: none !important; }
            .rounded-[30px], .rounded-[40px], .rounded-[50px] { border-radius: 0 !important; }
            
            .print-signatures {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 20px !important;
                margin-top: 30px !important;
                text-align: center !important;
            }
            .payslip-box {
                border: 2px solid #000 !important;
                padding: 20px !important;
                margin: 10px !important;
                page-break-after: always;
            }
        }
        .print-only { display: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .writing-mode-vertical {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .scroll-hidden::-webkit-scrollbar {
            display: none;
        }
        
        /* Table Styles for Payroll */
        .payroll-table th, .payroll-table td {
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React and Lucide Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: containerRef.current });
                    const svg = containerRef.current.querySelector('svg');
                    if (svg) {
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) className.split(' ').filter(Boolean).forEach(cls => svg.classList.add(cls));
                    }
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center pointer-events-none" style={{ width: size, height: size }}></span>;
        };

        const Attendance = ({ employees, attendanceLog, setAttendanceLog }) => {
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [previewData, setPreviewData] = useState(null);
            const fileInputRef = useRef(null);

            const calculateDeduction = (arrival, departure) => {
                let lateDeduction = 0;
                if (arrival) {
                    const [h, m] = arrival.split(':').map(Number);
                    const totalMinutes = h * 60 + m;
                    const limit915 = 9 * 60 + 15;
                    const limit930 = 9 * 60 + 30;
                    const limit1000 = 10 * 60;
                    const limit1030 = 10 * 60 + 30;
                    const limit1200 = 12 * 60;

                    if (totalMinutes <= limit915) lateDeduction = 0;
                    else if (totalMinutes <= limit930) lateDeduction = 0.5;
                    else if (totalMinutes <= limit1000) lateDeduction = 1;
                    else if (totalMinutes <= limit1030) lateDeduction = 1.5;
                    else if (totalMinutes <= limit1200) lateDeduction = 4;
                    else lateDeduction = 8;
                }

                let earlyDeduction = 0;
                if (departure) {
                    const [h, m] = departure.split(':').map(Number);
                    const totalMinutes = h * 60 + m;
                    const limit1700 = 17 * 60;
                    const limit1645 = 16 * 60 + 45;
                    const limit1600 = 16 * 60;
                    const limit1530 = 15 * 60 + 30;
                    const limit1500 = 15 * 60;
                    const limit1400 = 14 * 60;

                    if (totalMinutes >= limit1700) earlyDeduction = 0;
                    else if (totalMinutes >= limit1645) earlyDeduction = 0.5;
                    else if (totalMinutes >= limit1600) earlyDeduction = 1;
                    else if (totalMinutes >= limit1530) earlyDeduction = 1.5;
                    else if (totalMinutes >= limit1500) earlyDeduction = 2;
                    else if (totalMinutes >= limit1400) earlyDeduction = 4;
                    else earlyDeduction = 8;
                }
                return lateDeduction + earlyDeduction;
            };

            const updateRecord = (empId, field, value) => {
                const dateRecords = attendanceLog[selectedDate] || {};
                const currentRecord = dateRecords[empId] || { arrivalTime: '', departureTime: '', deduction: 0, notes: '' };
                const newRecord = { ...currentRecord, [field]: value };
                if (field === 'arrivalTime' || field === 'departureTime') {
                    newRecord.deduction = calculateDeduction(newRecord.arrivalTime, newRecord.departureTime);
                }
                setAttendanceLog(prev => ({
                    ...prev,
                    [selectedDate]: { ...dateRecords, [empId]: newRecord }
                }));
            };

            const handleFingerprintUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary', cellDates: true });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws);

                    if (rows.length === 0) return alert("الملف فارغ");

                    const parsedRecords = [];
                    rows.forEach(row => {
                        // Enhanced column mapping for Arabic and various formats
                        const code = row['كود البصمة'] || row['كود'] || row['Code'] || row['ID'] || row['رقم الموظف'];
                        const dateVal = row['التاريخ'] || row['Date'] || row['تاريخ'];
                        const entry = row['وقت الدخول'] || row['حضور'] || row['Entry'] || row['دخول'] || row['بصمة حضور'];
                        const exit = row['وقت الخروج'] || row['انصراف'] || row['Exit'] || row['خروج'] || row['بصمة انصراف'];

                        if (!code || !dateVal) return;

                        const emp = employees.find(e => e.code.toString() === code.toString());
                        if (!emp) return;

                        let formattedDate;
                        try {
                            if (dateVal instanceof Date) {
                                formattedDate = dateVal.toISOString().split('T')[0];
                            } else {
                                formattedDate = new Date(dateVal).toISOString().split('T')[0];
                            }
                        } catch (err) { return; }

                        const arrivalTime = entry ? (typeof entry === 'string' ? entry : new Date(entry).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })) : '';
                        const departureTime = exit ? (typeof exit === 'string' ? exit : new Date(exit).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })) : '';

                        parsedRecords.push({
                            empId: emp.id,
                            empName: emp.name,
                            empCode: emp.code,
                            date: formattedDate,
                            arrivalTime,
                            departureTime,
                            deduction: calculateDeduction(arrivalTime, departureTime),
                            notes: row['ملاحظات'] || ''
                        });
                    });

                    if (parsedRecords.length === 0) return alert("لم يتم العثور على بيانات صالحة للموظفين المسجلين");
                    setPreviewData(parsedRecords);
                };
                reader.readAsBinaryString(file);
                e.target.value = null;
            };

            const confirmUpload = () => {
                const newLog = { ...attendanceLog };
                previewData.forEach(rec => {
                    if (!newLog[rec.date]) newLog[rec.date] = {};
                    newLog[rec.date][rec.empId] = {
                        arrivalTime: rec.arrivalTime,
                        departureTime: rec.departureTime,
                        deduction: rec.deduction,
                        notes: rec.notes
                    };
                });
                setAttendanceLog(newLog);
                setPreviewData(null);
                alert(`تم حفظ ${previewData.length} سجل بنجاح`);
            };

            const updatePreviewRow = (idx, field, value) => {
                const newData = [...previewData];
                newData[idx] = { ...newData[idx], [field]: value };
                if (field === 'arrivalTime' || field === 'departureTime') {
                    newData[idx].deduction = calculateDeduction(newData[idx].arrivalTime, newData[idx].departureTime);
                }
                setPreviewData(newData);
            };

            const removePreviewRow = (idx) => {
                setPreviewData(previewData.filter((_, i) => i !== idx));
            };

            return (
                <div className="space-y-8 animate-fade-in">
                    {previewData && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-6xl rounded-[40px] shadow-2xl overflow-hidden animate-fade-in border border-slate-200 flex flex-col max-h-[90vh]">
                                <div className="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <div>
                                        <h3 className="text-2xl font-black text-slate-800">مراجعة وتعديل بيانات البصمة</h3>
                                        <p className="text-slate-500 font-bold text-sm">يمكنك تعديل المواعيد أو حذف السجلات قبل الحفظ</p>
                                    </div>
                                    <button onClick={() => setPreviewData(null)} className="p-3 rounded-2xl hover:bg-rose-50 text-slate-400 hover:text-rose-500 transition-colors">
                                        <Icon name="x" size={24} />
                                    </button>
                                </div>
                                <div className="p-8 overflow-y-auto flex-1">
                                    <table className="w-full text-right border-collapse">
                                        <thead className="bg-slate-100 text-slate-500 text-[10px] font-black uppercase sticky top-0 z-10">
                                            <tr>
                                                <th className="px-4 py-3 border-b">الموظف</th>
                                                <th className="px-4 py-3 border-b">التاريخ</th>
                                                <th className="px-4 py-3 border-b">حضور</th>
                                                <th className="px-4 py-3 border-b">انصراف</th>
                                                <th className="px-4 py-3 border-b text-center">خصم</th>
                                                <th className="px-4 py-3 border-b">ملاحظات</th>
                                                <th className="px-4 py-3 border-b text-center">إجراء</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {previewData.map((rec, idx) => (
                                                <tr key={idx} className="hover:bg-blue-50/30">
                                                    <td className="px-4 py-3"><span className="font-black block text-xs">{rec.empName}</span><span className="text-[9px] text-slate-400">كود: {rec.empCode}</span></td>
                                                    <td className="px-4 py-3 text-xs font-bold">{rec.date}</td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="time" 
                                                            value={rec.arrivalTime} 
                                                            onChange={(e) => updatePreviewRow(idx, 'arrivalTime', e.target.value)}
                                                            className="bg-slate-50 p-1.5 rounded-lg text-[10px] font-bold border border-slate-100 outline-none focus:ring-1 focus:ring-blue-400"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="time" 
                                                            value={rec.departureTime} 
                                                            onChange={(e) => updatePreviewRow(idx, 'departureTime', e.target.value)}
                                                            className="bg-slate-50 p-1.5 rounded-lg text-[10px] font-bold border border-slate-100 outline-none focus:ring-1 focus:ring-blue-400"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3 text-center">
                                                        <span className={`px-3 py-1 rounded-full font-black text-[10px] ${rec.deduction > 0 ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                                            {rec.deduction} س
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="text" 
                                                            value={rec.notes} 
                                                            onChange={(e) => updatePreviewRow(idx, 'notes', e.target.value)}
                                                            className="w-full bg-transparent border-b text-[10px] outline-none"
                                                            placeholder="..."
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3 text-center">
                                                        <button onClick={() => removePreviewRow(idx)} className="p-2 text-rose-500 hover:bg-rose-100 rounded-lg transition-colors">
                                                            <Icon name="trash-2" size={14} />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-8 bg-slate-50 border-t border-slate-100 flex gap-4">
                                    <button onClick={confirmUpload} className="flex-1 bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-emerald-700 transition-all flex items-center justify-center gap-2">
                                        <Icon name="check-circle" size={20} /> تأكيد وحفظ {previewData.length} سجل
                                    </button>
                                    <button onClick={() => setPreviewData(null)} className="px-8 bg-white text-slate-500 font-black py-4 rounded-2xl border border-slate-200 hover:bg-slate-50 transition-all">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div className="space-y-2">
                            <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3">
                                <Icon name="clock" className="text-blue-600" size={32} /> الحضور والانصراف اليومي
                            </h2>
                            <p className="text-slate-500 font-bold">تسجيل المواعيد وتطبيق اللائحة</p>
                            <div className="inline-flex items-center gap-2 bg-blue-50 border border-blue-100 px-4 py-1.5 rounded-xl">
                                <Icon name="info" size={16} className="text-blue-600" />
                                <span className="text-xs font-black text-blue-700">دورة الشهر: من يوم 26 حتى يوم 25 من الشهر التالي</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx, .xls, .csv" onChange={handleFingerprintUpload} />
                            <button 
                                onClick={() => fileInputRef.current.click()}
                                className="bg-emerald-600 text-white px-6 py-2.5 rounded-2xl font-black flex items-center gap-2 shadow-lg hover:bg-emerald-700 transition-all"
                            >
                                <Icon name="upload" size={18} /> رفع شيت بصمة
                            </button>
                            <div className="flex items-center gap-3 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                                <Icon name="calendar" className="text-slate-400" size={20} />
                                <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="outline-none font-bold text-slate-700 bg-transparent" />
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                        <div className="lg:col-span-1 space-y-4">
                            <div className="bg-blue-600 rounded-[40px] p-8 text-white shadow-xl">
                                <h3 className="font-black text-lg mb-4 flex items-center gap-2"><Icon name="info" size={20} /> لائحة التأخير</h3>
                                <ul className="space-y-2 text-xs font-bold opacity-90">
                                    <li className="flex justify-between border-b border-white/20 pb-1"><span>حتى 09:15 ص</span> <span>سماح</span></li>
                                    <li className="flex justify-between border-b border-white/20 pb-1"><span>حتى 09:30 ص</span> <span>0.5 س</span></li>
                                    <li className="flex justify-between border-b border-white/20 pb-1"><span>حتى 10:00 ص</span> <span>1 س</span></li>
                                    <li className="flex justify-between"><span>بعد 12:00 م</span> <span>8 س</span></li>
                                </ul>
                            </div>
                            <div className="bg-slate-800 rounded-[40px] p-8 text-white shadow-xl">
                                <h3 className="font-black text-lg mb-4 flex items-center gap-2"><Icon name="alert-circle" size={20} /> انصراف مبكر</h3>
                                <ul className="space-y-2 text-xs font-bold opacity-90">
                                    <li className="flex justify-between border-b border-white/20 pb-1"><span>من 05:00 م</span> <span>طبيعي</span></li>
                                    <li className="flex justify-between border-b border-white/20 pb-1"><span>04:45 م</span> <span>0.5 س</span></li>
                                    <li className="flex justify-between border-b border-white/20 pb-1"><span>04:00 م</span> <span>1 س</span></li>
                                    <li className="flex justify-between"><span>02:00 م</span> <span>4 س</span></li>
                                </ul>
                            </div>
                        </div>
                        <div className="lg:col-span-3">
                            <div className="rounded-[40px] shadow-2xl overflow-hidden border bg-white border-slate-100">
                                <table className="w-full text-right">
                                    <thead className="bg-slate-50 text-slate-500 text-[11px] font-black uppercase border-b">
                                        <tr><th className="px-6 py-5">الموظف</th><th className="px-4 py-5">حضور</th><th className="px-4 py-5">انصراف</th><th className="px-4 py-5 text-center">خصم</th><th className="px-4 py-5">ملاحظات</th></tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {employees.map(emp => {
                                            const record = (attendanceLog[selectedDate] && attendanceLog[selectedDate][emp.id]) || { arrivalTime: '', departureTime: '', deduction: 0, notes: '' };
                                            return (
                                                <tr key={emp.id} className="hover:bg-blue-50/30">
                                                    <td className="px-6 py-4"><span className="font-black block">{emp.name}</span><span className="text-[10px] text-slate-400">كود: {emp.code}</span></td>
                                                    <td className="px-4 py-4"><input type="time" value={record.arrivalTime} onChange={(e) => updateRecord(emp.id, 'arrivalTime', e.target.value)} className="bg-slate-50 p-2 rounded-xl text-xs font-bold border border-slate-100" /></td>
                                                    <td className="px-4 py-4"><input type="time" value={record.departureTime} onChange={(e) => updateRecord(emp.id, 'departureTime', e.target.value)} className="bg-slate-50 p-2 rounded-xl text-xs font-bold border border-slate-100" /></td>
                                                    <td className="px-4 py-4 text-center"><span className={`px-4 py-2 rounded-full font-black text-xs ${record.deduction > 0 ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>{record.deduction} س</span></td>
                                                    <td className="px-4 py-4"><input type="text" value={record.notes} onChange={(e) => updateRecord(emp.id, 'notes', e.target.value)} className="w-full bg-transparent border-b text-xs" /></td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const MonthlyReport = ({ employees, attendanceLog }) => {
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
            const [selectedEmpId, setSelectedEmpId] = useState('all');

            const monthData = useMemo(() => {
                const [year, month] = selectedMonth.split('-').map(Number);
                const startDate = new Date(year, month - 2, 26); 
                const endDate = new Date(year, month - 1, 25);  
                
                const days = [];
                let current = new Date(startDate);
                while (current <= endDate) {
                    days.push(new Date(current));
                    current.setDate(current.getDate() + 1);
                }
                return days;
            }, [selectedMonth]);

            const getDayName = (date) => {
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                return days[date.getDay()];
            };

            const reportRecords = useMemo(() => {
                const emps = selectedEmpId === 'all' ? employees : employees.filter(e => e.id === selectedEmpId);
                
                return emps.map(emp => {
                    const records = monthData.map((dateObj, idx) => {
                        const dateStr = dateObj.toISOString().split('T')[0];
                        const record = (attendanceLog[dateStr] && attendanceLog[dateStr][emp.id]) || null;
                        
                        // Calculate Late/Early/Total for the report
                        let late = 0;
                        let early = 0;
                        if (record && record.arrivalTime) {
                            const [h, m] = record.arrivalTime.split(':').map(Number);
                            const arrival = h + m/60;
                            if (arrival > 8.5) late = arrival - 8.5;
                        }
                        if (record && record.departureTime) {
                            const [h, m] = record.departureTime.split(':').map(Number);
                            const departure = h + m/60;
                            if (departure < 16.5) early = 16.5 - departure;
                        }

                        return { 
                            no: idx + 1,
                            date: dateStr, 
                            day: getDayName(dateObj),
                            in: record?.arrivalTime || '',
                            out: record?.departureTime || '',
                            total: record ? '8:00' : '', // Simplified for now
                            late: late.toFixed(2),
                            early: early.toFixed(2),

                    return { emp, records, totalDeduction, presentDays };

                    const arrival = newLog[date][empId].arrivalTime;
                    const departure = newLog[date][empId].departureTime;
                    
                    let lateDeduction = 0;
                    let earlyDeduction = 0;
                    
                    if (arrival) {
                        const [h, m] = arrival.split(':').map(Number);
                        const arrivalTimeNum = h + m/60;
                        if (arrivalTimeNum > 8.5) lateDeduction = arrivalTimeNum - 8.5;

                    if (departure) {
                        const [h, m] = departure.split(':').map(Number);
                        const departureTimeNum = h + m/60;
                        if (departureTimeNum < 16.5) earlyDeduction = 16.5 - departureTimeNum;

        const Payroll = ({ employees, payrollRecords, setPayrollRecords, attendanceLog, setActiveTab }) => {
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7)); 
            const [settlementTarget, setSettlementTarget] = useState(null);
            const [payslipTarget, setPayslipTarget] = useState(null);

            // Link Attendance Deductions Automatically
            useEffect(() => {
                const [year, month] = selectedMonth.split('-').map(Number);
                const startDate = new Date(year, month - 2, 26);
                const endDate = new Date(year, month - 1, 25);
                
                const days = [];
                let current = new Date(startDate);
                while (current <= endDate) {
                    days.push(current.toISOString().split('T')[0]);
                    current.setDate(current.getDate() + 1);
                }

                const updatedRecords = { ...payrollRecords };
                let changed = false;

                employees.forEach(emp => {
                    const totalLateHours = days.reduce((acc, date) => {
                        const rec = (attendanceLog[date] && attendanceLog[date][emp.id]);
                        return acc + (rec?.deduction || 0);
                    }, 0);

                    if (!updatedRecords[selectedMonth]) updatedRecords[selectedMonth] = {};
                    if (!updatedRecords[selectedMonth][emp.id]) {
                        updatedRecords[selectedMonth][emp.id] = {
                            grossSalary: emp.salary || 0,
                            leaveCount: 0, leaveVal: 0,
                            penaltyCount: 0, penaltyVal: 0,
                            absenceCount: 0, absenceVal: 0,
                            lateCount: totalLateHours, lateVal: totalLateHours * ((emp.salary || 0) / 30 / 8),
                            advanceInstallment: 0, advanceTotal: 0,
                            adjDeduction: 0, adjAddition: 0,
                            notes: '',
                            settlements: []
                        };
                        changed = true;
                    } else if (updatedRecords[selectedMonth][emp.id].lateCount !== totalLateHours) {
                        updatedRecords[selectedMonth][emp.id].lateCount = totalLateHours;
                        updatedRecords[selectedMonth][emp.id].lateVal = totalLateHours * ((updatedRecords[selectedMonth][emp.id].grossSalary || 0) / 30 / 8);
                        changed = true;
                    }
                });

                if (changed) setPayrollRecords(updatedRecords);
            }, [selectedMonth, attendanceLog, employees]);

            const handlePrint = () => {
                window.print();
            };

            const updateField = (empId, field, value) => {
                const monthRecords = payrollRecords[selectedMonth] || {};
                const current = monthRecords[empId] || {
                    grossSalary: 0,
                    leaveCount: 0, leaveVal: 0,
                    penaltyCount: 0, penaltyVal: 0,
                    absenceCount: 0, absenceVal: 0,
                    lateCount: 0, lateVal: 0,
                    advanceInstallment: 0, advanceTotal: 0,
                    adjDeduction: 0, adjAddition: 0,
                    notes: '',
                    settlements: []
                };
                
                const updated = { ...current, [field]: value };
                
                if (field !== 'settlements' && field !== 'notes') {
                    const numVal = parseFloat(value) || 0;
                    updated[field] = numVal;
                    const dayRate = (updated.grossSalary || 0) / 30;
                    if (field === 'leaveCount') updated.leaveVal = updated.leaveCount * dayRate;
                    if (field === 'absenceCount') updated.absenceVal = updated.absenceCount * dayRate;
                    if (field === 'lateCount') updated.lateVal = updated.lateCount * (dayRate / 8);
                }

                setPayrollRecords(prev => ({
                    ...prev,
                    [selectedMonth]: { ...monthRecords, [empId]: updated }
                }));
            };

            const calculateTotals = (record) => {
                const r = record || {};
                const totalDeductions = (r.leaveVal || 0) + (r.penaltyVal || 0) + (r.absenceVal || 0) + (r.lateVal || 0) + (r.advanceInstallment || 0) + (r.adjDeduction || 0);
                const netSalary = (r.grossSalary || 0) + (r.adjAddition || 0) - totalDeductions;
                return { totalDeductions, netSalary };

                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;

                }
                for (let i = 1; i <= daysCount; i++) {
                    days.push({ day: i, month, year, current: true });
                }
                const remaining = 42 - days.length;

            const handleExcelUpload = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (evt) => { const bstr = evt.target.result; const wb = XLSX.read(bstr, { type: 'binary', cellDates: true }); const ws = wb.Sheets[wb.SheetNames[0]]; const rows = XLSX.utils.sheet_to_json(ws, { header: 1 }); if (rows.length < 2) return alert("الملف فارغ تماماً."); const headers = rows[0].map(h => normalizeText(h)); const f = (k, df) => { const idx = headers.findIndex(h => k.some(ki => h.includes(normalizeText(ki)))); return idx !== -1 ? idx : df; }; const m = { code: f(['كود', 'بصمه'], 1), joinDate: f(['تاريخ', 'تعيين'], 2), name: f(['اسم'], 3), department: f(['قسم', 'اداره'], 4), jobTitle: f(['مسمي'], 5), nationalId: f(['قومي'], 6), phone: f(['هاتف'], 7), address: f(['عنوان'], 8) }; const res = rows.slice(1).map(r => ({ id: Math.random().toString(36).substr(2, 9), code: r[m.code]?.toString() || '', joinDate: r[m.joinDate] instanceof Date ? r[m.joinDate].toISOString().split('T')[0] : (r[m.joinDate]?.toString() || ''), name: r[m.name]?.toString() || '', department: r[m.department]?.toString() || '', jobTitle: r[m.jobTitle]?.toString() || '', nationalId: r[m.nationalId]?.toString() || '', phone: r[m.phone]?.toString() || '', address: r[m.address]?.toString() || '', status: 'نشط', totalLeaves: 21, monthlyLeaves: Array(12).fill(0) })).filter(emp => emp.name && emp.code); if (res.length) { onBulkAdd(res); alert(`تم استيراد بيانات ${res.length} موظف بنجاح.`); } }; reader.readAsBinaryString(file); e.target.value = null; };

                            <table className="w-full text-right border-collapse">
                                <thead className="bg-slate-50 text-slate-500 text-[11px] font-black uppercase tracking-wider border-b border-slate-100"><tr><th className="px-4 py-5">م</th><th className="px-4 py-5">الكود</th><th className="px-4 py-5">تاريخ التعيين</th><th className="px-6 py-5">الاسم الكامل</th><th className="px-4 py-5">الإدارة</th><th className="px-4 py-5">المسمى الوظيفي</th><th className="px-6 py-5">الرقم القومي</th><th className="px-4 py-5 text-center">الإجراءات</th></tr></thead>
                                <tbody className="divide-y divide-slate-50">{filteredEmployees.length ? filteredEmployees.map((emp, index) => (<tr key={emp.id} className="hover:bg-indigo-500/5 transition-colors group"><td className="px-4 py-4 font-bold text-slate-500">{index + 1}</td><td className="px-4 py-4 font-mono font-black text-indigo-500">{emp.code}</td><td className="px-4 py-4 text-xs font-bold text-slate-500">{emp.joinDate}</td><td className="px-6 py-4 font-black text-base text-slate-800">{emp.name}</td><td className="px-4 py-4 text-sm font-bold text-slate-500">{emp.department}</td><td className="px-4 py-4 text-sm font-bold text-slate-500">{emp.jobTitle}</td><td className="px-6 py-4 font-mono text-xs text-slate-500">{emp.nationalId}</td><td className="px-4 py-4 text-center"><div className="flex justify-center items-center gap-2"><button onClick={() => { setEditingEmp(emp); setFormData({ ...emp }); setShowModal(true); }} className="p-2 rounded-lg bg-indigo-500/10 text-indigo-500 hover:bg-indigo-500 transition-all hover:text-white"><Icon name="edit" size={16} /></button><button onClick={() => { if(confirm('حذف الموظف؟')) onDeleteEmployee(emp.id); }} className="p-2 rounded-lg bg-rose-500/10 text-rose-500 hover:bg-rose-500 transition-all hover:text-white"><Icon name="trash-2" size={16} /></button></div></td></tr>)) : <tr><td colSpan="8" className="px-6 py-10 text-center text-slate-400 font-bold italic">لا توجد بيانات حالياً</td></tr>}</tbody>
                            </table>
                        </div>
                    </div>
                    {showModal && (<div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4"><div className="w-full max-w-4xl p-10 rounded-[50px] shadow-2xl animate-fade-in border bg-white border-slate-200"><div className="flex justify-between items-center mb-8"><h3 className="text-3xl font-black text-slate-800">{editingEmp ? 'تعديل بيانات الموظف' : 'إضافة موظف جديد'}</h3><button onClick={() => setShowModal(false)} className="text-slate-400 hover:text-rose-500"><Icon name="x" size={32} /></button></div><form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الاسم الكامل</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الكود الوظيفي</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.code} onChange={(e) => setFormData({...formData, code: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">تاريخ التعيين</label><input required type="date" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.joinDate} onChange={(e) => setFormData({...formData, joinDate: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الإدارة</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.department} onChange={(e) => setFormData({...formData, department: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">المسمى الوظيفي</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.jobTitle} onChange={(e) => setFormData({...formData, jobTitle: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الرقم القومي</label><input required type="text" maxLength="14" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.nationalId} onChange={(e) => setFormData({...formData, nationalId: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">رقم الهاتف</label><input required type="tel" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} /></div><div className="md:col-span-2 space-y-1"><label className="text-xs font-black text-slate-500 uppercase">العنوان السكني</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.address} onChange={(e) => setFormData({...formData, address: e.target.value})} /></div><div className="md:col-span-3 pt-6"><button type="submit" className="w-full bg-indigo-600 text-white font-black py-4 rounded-3xl text-xl shadow-xl hover:bg-indigo-700 transition-all">حفظ البيانات</button></div></form></div></div>)}
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => {
                return localStorage.getItem('hr_isLoggedIn') === 'true';
            });
            const [userName, setUserName] = useState(() => {
                return localStorage.getItem('hr_userName') || '';
            });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [employees, setEmployees] = useState(() => {
                const saved = localStorage.getItem('hr_employees');
                return saved ? JSON.parse(saved) : INITIAL_EMPLOYEES;
            });
            const [insuranceRecords, setInsuranceRecords] = useState(() => {
                const saved = localStorage.getItem('hr_insurance');
                return saved ? JSON.parse(saved) : {};
            });
            const [contractRecords, setContractRecords] = useState(() => {
                const saved = localStorage.getItem('hr_contracts');
                return saved ? JSON.parse(saved) : {};
            });
            const [attendanceLog, setAttendanceLog] = useState(() => {
                const saved = localStorage.getItem('hr_attendance');
                return saved ? JSON.parse(saved) : {};
            });
            const [payrollRecords, setPayrollRecords] = useState(() => {
                const saved = localStorage.getItem('hr_payroll');
                return saved ? JSON.parse(saved) : {};
            });
            const [calendarEvents, setCalendarEvents] = useState(() => {
                const saved = localStorage.getItem('hr_calendar');
                return saved ? JSON.parse(saved) : INITIAL_CALENDAR_EVENTS;
            });
            const [currentTime, setCurrentTime] = useState(new Date());

            useEffect(() => {
                localStorage.setItem('hr_isLoggedIn', isLoggedIn);
                localStorage.setItem('hr_userName', userName);
                localStorage.setItem('hr_employees', JSON.stringify(employees));
                localStorage.setItem('hr_insurance', JSON.stringify(insuranceRecords));
                localStorage.setItem('hr_contracts', JSON.stringify(contractRecords));
                localStorage.setItem('hr_attendance', JSON.stringify(attendanceLog));
                localStorage.setItem('hr_payroll', JSON.stringify(payrollRecords));
                localStorage.setItem('hr_calendar', JSON.stringify(calendarEvents));
            }, [isLoggedIn, userName, employees, insuranceRecords, contractRecords, attendanceLog, payrollRecords, calendarEvents]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const addEmployee = (d) => setEmployees([...employees, { ...d, id: Date.now().toString(), status: 'نشط', totalLeaves: 21, monthlyLeaves: Array(12).fill(0) }]);
            const bulkAddEmployees = (list) => setEmployees(p => [...p, ...list]);
            const updateEmployee = (u) => setEmployees(employees.map(e => e.id === u.id ? { ...e, ...u } : e));
            const deleteEmployee = (id) => setEmployees(employees.filter(e => e.id !== id));

            const handleRestore = (data) => {
                if (data.employees) setEmployees(data.employees);
                if (data.attendanceLog) setAttendanceLog(data.attendanceLog);
                if (data.insuranceRecords) setInsuranceRecords(data.insuranceRecords);
                if (data.contractRecords) setContractRecords(data.contractRecords);
                if (data.payrollRecords) setPayrollRecords(data.payrollRecords);
                if (data.calendarEvents) setCalendarEvents(data.calendarEvents);
            };

            const handleClear = () => {
                if (confirm('تحذير: هل أنت متأكد من مسح كافة بيانات النظام نهائياً؟ لا يمكن التراجع عن هذه الخطوة.')) {
                    setEmployees([]);
                    setAttendanceLog({});
                    setInsuranceRecords({});
                    setContractRecords({});
                    setPayrollRecords({});
                    setCalendarEvents([]);
                    alert('تم مسح كافة البيانات بنجاح.');
                }
            };

            const formattedDate = currentTime.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const formattedTime = currentTime.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                        <div className="max-w-md w-full p-12 rounded-[60px] text-center border shadow-2xl bg-white border-slate-200">
                            <div className="w-24 h-24 bg-indigo-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-8 shadow-2xl rotate-3"><Icon name="user-circle-2" size={54} /></div>
                            <h1 className="text-4xl font-black text-slate-800 mb-2 tracking-tight">المنسق HR</h1>
                            <p className="text-slate-500 mb-10 font-bold uppercase tracking-widest text-xs">نظام إدارة الموارد البشرية المتكامل</p>
                            <form onSubmit={(e) => { e.preventDefault(); if(userName.trim()) setIsLoggedIn(true); }} className="space-y-6">
                                <input required type="text" placeholder="ما هو اسمك؟" className="w-full bg-slate-50 border border-slate-200 rounded-2xl py-5 px-8 text-slate-800 text-center text-xl font-bold focus:outline-none" value={userName} onChange={(e) => setUserName(e.target.value)} />
                                <button type="submit" className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 text-xl">دخول النظام <Icon name="arrow-left" size={24} /></button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col desktop-container px-6 py-8">
                    <header className="glass-card rounded-[35px] py-4 px-10 flex items-center justify-between mb-10 no-print sticky top-4 z-50">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setActiveTab('dashboard')}>
                            <div className="p-3 rounded-2xl shadow-xl bg-slate-900 text-white"><Icon name="layout-grid" size={24} /></div>
                            <div className="flex flex-col">
                                <span className="text-2xl font-black tracking-tighter hidden sm:block text-slate-800 leading-none">المنسق HR</span>
                            </div>
                        </div>
                        <div className="flex-1 flex justify-center items-center gap-6 px-4">
                            <nav className="hidden xl:flex items-center gap-1">
                                {[
                                    {id: 'dashboard', label: 'الرئيسية'},
                                    {id: 'employees', label: 'الموظفين'},
                                    {id: 'attendance', label: 'الحضور'},
                                    {id: 'monthly_report', label: 'التقرير'},
                                    {id: 'payroll', label: 'المرتبات'},
                                    {id: 'calendar', label: 'التقويم'},
                                    {id: 'leaves', label: 'الإجازات'},
                                    {id: 'archive', label: 'الأرشيف'},
                                    {id: 'insurance', label: 'التأمينات'},
                                    {id: 'contracts', label: 'العقود'},
                                    {id: 'settings', label: 'الإعدادات'}
                                ].map((l, i) => (
                                    <button key={i} onClick={() => setActiveTab(l.id)} className={`px-4 py-2 rounded-xl font-bold text-xs transition-all ${activeTab === l.id ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100'}`}>{l.label}</button>
                                ))}
                            </nav>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="hidden xl:flex items-center gap-4 bg-slate-50/80 px-4 py-2 rounded-2xl border border-slate-100 shadow-inner group hover:bg-white transition-all">
                                <div className="flex flex-col text-right leading-tight">
                                    <span className="text-[13px] font-bold text-slate-700">{formattedDate}</span>
                                    <span className="text-[11px] font-black text-indigo-600 font-mono">{formattedTime}</span>
                                </div>
                                <div className="w-9 h-9 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center shadow-sm group-hover:rotate-12 transition-transform">
                                    <Icon name="calendar" size={18} />
                                </div>
                            </div>
                            <button onClick={() => setIsLoggedIn(false)} className="text-rose-500 hover:bg-rose-50 p-3 rounded-2xl transition-all" title="خروج"><Icon name="log-out" size={24} /></button>
                        </div>
                    </header>
                    <main className="flex-1">
                        {activeTab === 'dashboard' ? (
                            <Dashboard setActiveTab={setActiveTab} userName={userName} />
                        ) : activeTab === 'employees' ? (
                            <EmployeeTable employees={employees} onAddEmployee={addEmployee} onUpdateEmployee={updateEmployee} onDeleteEmployee={deleteEmployee} onBulkAdd={bulkAddEmployees} />
                        ) : activeTab === 'attendance' ? (
                            <Attendance employees={employees} attendanceLog={attendanceLog} setAttendanceLog={setAttendanceLog} />
                        ) : activeTab === 'monthly_report' ? (
                            <MonthlyReport employees={employees} attendanceLog={attendanceLog} setAttendanceLog={setAttendanceLog} />
                        ) : activeTab === 'payroll' ? (
                            <Payroll employees={employees} payrollRecords={payrollRecords} setPayrollRecords={setPayrollRecords} attendanceLog={attendanceLog} setActiveTab={setActiveTab} />
                        ) : activeTab === 'leaves' ? (
                            <Leaves employees={employees} onUpdateEmployee={updateEmployee} />
                        ) : activeTab === 'archive' ? (
                            <Archive employees={employees} />
                        ) : activeTab === 'insurance' ? (
                            <Insurance employees={employees} insuranceRecords={insuranceRecords} setInsuranceRecords={setInsuranceRecords} />
                        ) : activeTab === 'contracts' ? (
                            <Contracts employees={employees} contractRecords={contractRecords} setContractRecords={setContractRecords} />
                        ) : activeTab === 'calendar' ? (
                            <Calendar employees={employees} calendarEvents={calendarEvents} setCalendarEvents={setCalendarEvents} />
                        ) : activeTab === 'settings' ? (
                            <Settings appData={{ employees, attendanceLog, insuranceRecords, contractRecords, payrollRecords, calendarEvents }} onRestore={handleRestore} onClear={handleClear} />
                        ) : (
                            <div className="text-center py-40 text-slate-300 font-black text-4xl uppercase tracking-[0.2em] animate-pulse">سيتم التفعيل قريباً</div>
                        )}
                    </main>
                    <footer className="mt-12 mb-6 text-center no-print text-slate-500 font-bold text-[12px] uppercase tracking-wide">تطوير: عمر نشأت &copy; {new Date().getFullYear()}</footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
</body>
</html>
